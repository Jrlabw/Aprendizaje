    <main>
        <div class="container mt-5">
            <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card shadow">
                <div class="card-body">
                    <h3 class="card-title text-center mb-4">Registro de Usuario</h3>
                    <form>
                    <div class="mb-3">
                        <label for="nombre" class="form-label">Nombre</label>
                        <input type="text" class="form-control" id="nombre" placeholder="Ingresa tu nombre" required>
                    </div>
                    <div class="mb-3">
                        <label for="apellido" class="form-label">Apellido</label>
                        <input type="text" class="form-control" id="apellido" placeholder="Ingresa tu apellido" required>
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">Correo electrónico</label>
                        <input type="email" class="form-control" id="email" placeholder="Ingresa tu correo" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Contraseña</label>
                        <input type="password" class="form-control" id="password" placeholder="Ingresa tu contraseña" required>
                    </div>
                    <div class="mb-3">
                        <label for="confirmarPassword" class="form-label">Confirmar Contraseña</label>
                        <input type="password" class="form-control" id="confirmarPassword" placeholder="Confirma tu contraseña" required>
                    </div>
                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="terminos" required>
                        <label class="form-check-label" for="terminos">Acepto los términos y condiciones</label>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Registrarse</button>
                    </form>
                </div>
                </div>
            </div>
            </div>
        </div>
    </main>
